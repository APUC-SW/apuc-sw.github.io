name: Translation Progress Updater

on:
  push:
    paths:
      - 'global/wiki/doc/**'

jobs:
  calculate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install gray-matter

      - name: Calculate Progress by Filename
        run: |
          node -e "
          const fs = require('fs');
          const path = require('path');
          const matter = require('gray-matter');

          const baseDirs = ['global/wiki/doc/main', 'global/wiki/doc/sub'];
          const stats = {}; // { main: { en: 80, ko: 100 }, sub: { en: 40 } }

          baseDirs.forEach(dir => {
            if (!fs.existsSync(dir)) return;
            const category = path.basename(dir);
            stats[category] = {};

            const files = fs.readdirSync(dir).filter(f => f.endsWith('.md'));
            const langGroups = {};

            files.forEach(file => {
              // 파일명에서 마지막 '_' 이후의 언어코드 추출 (예: about_en.md -> en)
              const match = file.match(/_([a-z]{2})\.md$/);
              if (!match) return;
              
              const lang = match[1];
              const content = fs.readFileSync(path.join(dir, file), 'utf-8');
              const { data } = matter(content);
              const progress = data.progress || 0;

              if (!langGroups[lang]) langGroups[lang] = [];
              langGroups[lang].push(progress);
            });

            // 언어별 평균 계산
            for (const [lang, values] of Object.entries(langGroups)) {
              const avg = Math.round(values.reduce((a, b) => a + b, 0) / values.length);
              stats[category][lang] = avg;
            }
          });

          fs.writeFileSync('global/resources/data/doc_status.json', JSON.stringify(stats, null, 2));
          "

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add global/resources/data/doc_status.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "docs: sync translation stats [skip ci]" && git push)
